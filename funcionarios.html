<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
 <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>
        <header>
            <h1>Cadastro de Funcionário</h1>
        </header>

        <form id="formCadastro">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" required autocomplete="name">
            </div>

            <div class="form-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" required>
            </div>

            <div class="form-group">
                <label for="telefone">telefone</label>
                <input type="tel" id="telefone" name="telefone" required autocomplete="tel">
            </div>

            <div class="form-group">
                <label for="cargo">Cargo</label>
                <input type="text" id="cargo" name="cargo" required>
            </div>

            <button type="submit">💾 Salvar e Enviar</button>
            <output id="mensagem"></output>
        </form>
    </main>

    <script>
        function enviar() {
            const dados = new URLSearchParams();

            dados.append("nome", document.getElementById("nome").value);
            dados.append("email", document.getElementById("email").value);
            dados.append("mensagem", document.getElementById("mensagem").value);

            fetch("https://script.google.com/macros/s/AKfycbzZFN68pj5CQ6IeGC6mIiMdOTtWozJrD5Rj_soUYcu7H0w_q4XHO4t4rLO5qz3RBFp-/exec", {
                method: "POST",
                body: dados
            })
                .then(res => res.text())
                .then(res => {
                    console.log(res);
                    alert("Enviado com sucesso!");
                })
                .catch(err => {
                    console.error(err);
                    alert("Erro: " + err);
                });
        }
    </script>
